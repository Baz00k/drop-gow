name: Build and Test Drop-App Image

on:
    push:
        branches: [master]
        paths:
            - "apps/drop-app/**"
            - ".github/workflows/build-and-test.yml"
            - ".github/dependency-refs.json"
    pull_request:
        paths:
            - "apps/drop-app/**"
            - ".github/workflows/build-and-test.yml"
            - ".github/dependency-refs.json"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/drop-app

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Read dependency versions
              id: deps
              run: |
                  DROP_APP_VERSION=$(jq -r '.drop_app.version | ltrimstr("v")' .github/dependency-refs.json)
                  DROP_APP_SHA256=$(jq -r '.drop_app.sha256' .github/dependency-refs.json)
                  echo "drop_app_version=$DROP_APP_VERSION" >> $GITHUB_OUTPUT
                  echo "drop_app_sha256=$DROP_APP_SHA256" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=edge,branch=master
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=sha-
                  flavor: |
                      latest=auto

            - name: Build image
              uses: docker/build-push-action@v6
              with:
                  context: ./apps/drop-app/build
                  file: ./apps/drop-app/build/Dockerfile
                  push: false
                  load: true
                  tags: drop-app:test
                  build-args: |
                      BASE_APP_IMAGE=ghcr.io/games-on-whales/base-app:edge
                      IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
                      DROP_APP_VERSION=${{ steps.deps.outputs.drop_app_version }}
                      DROP_APP_SHA256=${{ steps.deps.outputs.drop_app_sha256 }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Run dependency validation
              run: |
                  docker run --rm --entrypoint /opt/gow/validate-deps.sh drop-app:test

            - name: Push image
              id: push
              if: github.event_name != 'pull_request'
              uses: docker/build-push-action@v6
              with:
                  context: ./apps/drop-app/build
                  file: ./apps/drop-app/build/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      BASE_APP_IMAGE=ghcr.io/games-on-whales/base-app:edge
                      IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
                      DROP_APP_VERSION=${{ steps.deps.outputs.drop_app_version }}
                      DROP_APP_SHA256=${{ steps.deps.outputs.drop_app_sha256 }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Output image digest
              if: github.event_name != 'pull_request'
              run: |
                  echo "## Image Published" >> $GITHUB_STEP_SUMMARY
                  echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
                  echo '${{ steps.meta.outputs.tags }}' | while read tag; do
                    echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
                  done
